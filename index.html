<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiwoo's Private Space 🐷</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;900&display=swap');
        
        :root {
            --primary-pink: #ff5c8a;
            --secondary-pink: #ffb8d1;
            --bg-dark: #0b0b0f;
            --card-dark: #161622;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 고급 커스텀 스크롤바 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-pink), #8b5cf6);
            border-radius: 5px;
            border: 2px solid var(--bg-dark);
        }

        /* 배경을 수놓는 몽환적인 움직이는 그라데이션 오로라 효과 */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 30%, #4c1d95 0%, transparent 50%),
                        radial-gradient(circle at 40% 70%, #831843 0%, transparent 45%),
                        radial-gradient(circle at 70% 80%, #0f172a 0%, transparent 60%);
            background-color: var(--bg-dark);
            opacity: 0.85;
        }

        .aurora-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: floatBall 20s infinite alternate ease-in-out;
        }
        .aurora-1 { width: 500px; height: 500px; background: var(--primary-pink); top: -10%; left: -10%; }
        .aurora-2 { width: 600px; height: 600px; background: #6366f1; bottom: -20%; right: -10%; animation-delay: -5s; }
        .aurora-3 { width: 400px; height: 400px; background: #06b6d4; top: 40%; left: 50%; animation-delay: -10s; }

        @keyframes floatBall {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(80px, 50px) scale(1.2) rotate(360deg); }
        }

        /* 인트로 화면 -> 메인 전환 애니메이션 트랜지션 */
        .page-transition {
            transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* 흐르는 가사/제목 애니메이션 (Marquee) */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: marquee 12s linear infinite;
        }

        /* 오디오 이퀄라이저 막대 애니메이션 */
        @keyframes eqBounce {
            0%, 100% { height: 4px; }
            50% { height: 26px; }
        }
        .eq-bar {
            animation: eqBounce 1s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) { animation-delay: 0.1s; animation-duration: 0.7s; }
        .eq-bar:nth-child(2) { animation-delay: 0.4s; animation-duration: 0.9s; }
        .eq-bar:nth-child(3) { animation-delay: 0.2s; animation-duration: 1.1s; }
        .eq-bar:nth-child(4) { animation-delay: 0.6s; animation-duration: 0.8s; }
        .eq-bar:nth-child(5) { animation-delay: 0.3s; animation-duration: 1.2s; }

        /* 마인크래프트 스타일 돼지코 입체 가상 요소 */
        .pixel-pig-nose {
            position: relative;
        }
        .pixel-pig-nose::after {
            content: '';
            position: absolute;
            width: 46px;
            height: 26px;
            background-color: #ff7597;
            border: 4px solid #e03d6d;
            border-radius: 4px;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 4px 4px 0px var(--secondary-pink);
        }

        /* 앨범 카드 호버 시 잔잔한 네온 발광 */
        .neon-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px -5px rgba(255, 92, 138, 0.25);
            background-color:
